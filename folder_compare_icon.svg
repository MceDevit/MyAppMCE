<svg width="512" height="512" viewBox="0 0 680 740" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>Folder Compare app icon</title>
  <desc>Dark theme app icon showing Folder 1 and Folder 2 with bidirectional diff actions</desc>

  <defs>
    <clipPath id="iconClip">
      <rect x="90" y="90" width="500" height="560" rx="112"/>
    </clipPath>
    <marker id="arrowL" viewBox="0 0 10 10" refX="2" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M8 1L2 5L8 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrowR" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <rect x="90" y="90" width="500" height="560" rx="112" fill="#0f0f0f"/>
  <rect x="90" y="90" width="500" height="560" rx="112" fill="none" stroke="#2a2a2a" stroke-width="2"/>

  <g clip-path="url(#iconClip)">
    <rect x="138" y="200" width="88" height="22" rx="8" fill="#1a2a4a"/>
    <rect x="138" y="218" width="194" height="148" rx="10" fill="#1a2a4a"/>
    <rect x="138" y="218" width="194" height="4" rx="0" fill="#1e3260"/>
    <text x="235" y="214" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#6a8fd8">Folder 1</text>

    <rect x="158" y="248" width="110" height="8" rx="3" fill="#2a3f6a"/>
    <rect x="158" y="266" width="90"  height="8" rx="3" fill="#2a3f6a"/>
    <rect x="158" y="284" width="130" height="8" rx="3" fill="#ff6d00" opacity="0.9"/>
    <rect x="158" y="302" width="75"  height="8" rx="3" fill="#2a3f6a"/>
    <rect x="158" y="320" width="100" height="8" rx="3" fill="#ffd600" opacity="0.9"/>
    <rect x="158" y="338" width="85"  height="8" rx="3" fill="#2a3f6a"/>

    <rect x="350" y="200" width="88" height="22" rx="8" fill="#222222"/>
    <rect x="350" y="218" width="194" height="148" rx="10" fill="#222222"/>
    <rect x="350" y="218" width="194" height="4" rx="0" fill="#2e2e2e"/>
    <text x="447" y="214" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#888888">Folder 2</text>

    <rect x="370" y="248" width="110" height="8" rx="3" fill="#333333"/>
    <rect x="370" y="266" width="90"  height="8" rx="3" fill="#333333"/>
    <rect x="370" y="284" width="98"  height="8" rx="3" fill="#ff6d00" opacity="0.9"/>
    <rect x="370" y="302" width="75"  height="8" rx="3" fill="#333333"/>
    <rect x="370" y="320" width="118" height="8" rx="3" fill="#ffd600" opacity="0.9"/>
    <rect x="370" y="338" width="85"  height="8" rx="3" fill="#333333"/>

    <line x1="295" y1="281" x2="349" y2="281" stroke="#ff6d00" stroke-width="1.5" stroke-dasharray="4 3" opacity="0.85" marker-end="url(#arrowR)"/>
    <line x1="349" y1="291" x2="295" y2="291" stroke="#ff6d00" stroke-width="1.5" stroke-dasharray="4 3" opacity="0.85" marker-end="url(#arrowL)"/>
    <line x1="295" y1="317" x2="349" y2="317" stroke="#ffd600" stroke-width="1.5" opacity="0.9" marker-end="url(#arrowR)"/>
    <line x1="349" y1="327" x2="295" y2="327" stroke="#ffd600" stroke-width="1.5" opacity="0.9" marker-end="url(#arrowL)"/>

    <rect x="138" y="408" width="412" height="118" rx="10" fill="#1a1a1a"/>

    <line x1="163" y1="426" x2="155" y2="426" stroke="#ff6d00" stroke-width="1.5" stroke-dasharray="3 2" marker-end="url(#arrowL)"/>
    <circle cx="165" cy="426" r="3" fill="#ff6d00"/>
    <text x="175" y="430" font-family="Arial, sans-serif" font-size="11" fill="#9e9e9e">copy to folder 1</text>

    <line x1="163" y1="446" x2="155" y2="446" stroke="#ffd600" stroke-width="1.5" marker-end="url(#arrowL)"/>
    <circle cx="165" cy="446" r="3" fill="#ffd600"/>
    <text x="175" y="450" font-family="Arial, sans-serif" font-size="11" fill="#9e9e9e">move to folder 1</text>

    <line x1="157" y1="466" x2="165" y2="466" stroke="#ff6d00" stroke-width="1.5" stroke-dasharray="3 2" marker-end="url(#arrowR)"/>
    <circle cx="155" cy="466" r="3" fill="#ff6d00"/>
    <text x="175" y="470" font-family="Arial, sans-serif" font-size="11" fill="#9e9e9e">copy to folder 2</text>

    <line x1="157" y1="486" x2="165" y2="486" stroke="#ffd600" stroke-width="1.5" marker-end="url(#arrowR)"/>
    <circle cx="155" cy="486" r="3" fill="#ffd600"/>
    <text x="175" y="490" font-family="Arial, sans-serif" font-size="11" fill="#9e9e9e">move to folder 2</text>

    <rect x="155" y="500" width="10" height="9" rx="1" fill="none" stroke="#ff1744" stroke-width="1.2"/>
    <line x1="152" y1="500" x2="168" y2="500" stroke="#ff1744" stroke-width="1.2" stroke-linecap="round"/>
    <rect x="157" y="497" width="6" height="3" rx="1" fill="none" stroke="#ff1744" stroke-width="1"/>
    <line x1="158" y1="503" x2="158" y2="506" stroke="#ff1744" stroke-width="1" stroke-linecap="round" opacity="0.7"/>
    <line x1="160" y1="503" x2="160" y2="506" stroke="#ff1744" stroke-width="1" stroke-linecap="round" opacity="0.7"/>
    <line x1="162" y1="503" x2="162" y2="506" stroke="#ff1744" stroke-width="1" stroke-linecap="round" opacity="0.7"/>
    <text x="175" y="509" font-family="Arial, sans-serif" font-size="11" fill="#9e9e9e">move to trash</text>

    <text x="340" y="562" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="600" fill="#f5f5f5" letter-spacing="1">Folder Compare</text>
  </g>
</svg>
